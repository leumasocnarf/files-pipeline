apiVersion: v1
kind: ConfigMap
metadata:
  name: report-service-config
data:
  SERVER_PORT: "8083"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/report_service"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  JWT_RESOURCE_ID: "report-service"
  JWT_PRINCIPAL_ATTRIBUTE: "preferred_username"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  labels:
    app: report-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: report-service
  template:
    metadata:
      labels:
        app: report-service
    spec:
      containers:
        - name: report-service
          image: files-pipeline-report-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: report-service-config
            - secretRef:
                name: report-service-secret
          env:
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx192m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
          resources:
            requests:
              memory: "384Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: report-service
spec:
  type: ClusterIP
  selector:
    app: report-service
  ports:
    - port: 8083
      targetPort: 8083