services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ingest-service/init-database.sql:/docker-entrypoint-initdb.d/ingest_service.sql
      - ./processing-service/init-database.sql:/docker-entrypoint-initdb.d/processing_service.sql
      - ./report-service/init-database.sql:/docker-entrypoint-initdb.d/report_service.sql
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:8.1.0
    container_name: kafka
    env_file:
      - ./kafka.env
    ports:
      - "9092"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 5

  schema-registry:
    image: confluentinc/cp-schema-registry:8.1.0
    container_name: schema-registry
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: ${SR_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_LISTENERS: ${SR_LISTENERS}
    ports:
      - "${SR_PORT}:8085"
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:${SR_PORT}/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: true
      KC_HTTP_PORT: ${KC_HTTP_PORT}
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL}
      KC_HOSTNAME_ADMIN_URL: ${KC_HOSTNAME_ADMIN_URL}
      KC_HTTP_RELATIVE_PATH: /
      KC_HOSTNAME_STRICT_BACKCHANNEL: false
      KC_LOG_LEVEL: DEBUG
    command: start-dev --import-realm
    ports:
      - "${KC_HTTP_PORT}:8080"
    volumes:
      - ./auth/realm.json:/opt/keycloak/data/import/realm.json:ro
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: # source: https://stackoverflow.com/questions/75693830/keycloak-v21-docker-container-health-check-failing
        [ "CMD-SHELL",
          'exec 3<>/dev/tcp/keycloak/${KC_HTTP_PORT}; 
          echo -e "GET /health/ready HTTP/1.1\n
          host: keycloak:${KC_HTTP_PORT}\n" >&3;
           timeout --preserve-status 1 cat <&3 | grep -m 1 status | grep -m 1 UP;
            ERROR=$?; 
            exec 3<&-; 
            exec 3>&-; 
            exit $ERROR'
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-gateway:
    image: nginx:1.29-alpine-slim
    container_name: api-gateway
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      keycloak:
        condition: service_healthy

  ingest-service:
    build:
      context: ./ingest-service
    container_name: ingest-service
    env_file:
      - ./ingest-service/.env
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
    ports:
      - "8081"
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      api-gateway:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    extra_hosts:
      - "${AUTH_SERVICE_HOST}:host-gateway"

  processing-service:
    build:
      context: ./processing-service
    container_name: processing-service
    env_file:
      - ./processing-service/.env
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
    ports:
      - "8082"
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      ingest-service:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    extra_hosts:
      - "${AUTH_SERVICE_HOST}:host-gateway"

  report-service:
    build:
      context: ./report-service
    container_name: report-service
    env_file:
      - ./report-service/.env
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
    ports:
      - "8083"
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      processing-service:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    extra_hosts:
      - "${AUTH_SERVICE_HOST}:host-gateway"

volumes:
  postgres-data: