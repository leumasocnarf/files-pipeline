# ---------------------------------------------------------------------------
# Common definitions
# ---------------------------------------------------------------------------
x-java-service: &java-service
  restart: unless-stopped
  environment:
    JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
  deploy:
    resources:
      limits:
        memory: 384M

x-java-healthcheck: &java-healthcheck
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 60s


services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ingest-service/init-database.sql:/docker-entrypoint-initdb.d/ingest_service.sql
      - ./processing-service/init-database.sql:/docker-entrypoint-initdb.d/processing_service.sql
      - ./report-service/init-database.sql:/docker-entrypoint-initdb.d/report_service.sql
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:8.1.0
    env_file:
      - ./.env
    ports:
      - "9092"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 5

  schema-registry:
    image: confluentinc/cp-schema-registry:8.1.0
    container_name: schema-registry
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: ${SR_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_LISTENERS: ${SR_LISTENERS}
    ports:
      - "${SR_PORT}:8085"
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:${SR_PORT}/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_PORT: ${KC_PORT}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_PORT: ${KC_PORT}
    command: start-dev --import-realm
    ports:
      - "${KC_PORT}:8180"
    volumes:
      - ./auth/realm.json:/opt/keycloak/data/import/realm.json:ro
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", # source: https://stackoverflow.com/questions/75693830/keycloak-v21-docker-container-health-check-failing
        'exec 3<>/dev/tcp/${KC_HOSTNAME}/${KC_PORT};
                echo -e "GET /health/ready HTTP/1.1\n
                host: ${KC_HOSTNAME}:${KC_PORT}\n" >&3;
                 timeout --preserve-status 1 cat <&3 | grep -m 1 status | grep -m 1 UP;
                  ERROR=$?;
                  exec 3<&-;
                  exec 3>&-;
                  exit $ERROR'
      ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  gateway-service:
    <<: *java-service
    build:
      context: ./gateway-service
    container_name: gateway-service
    env_file:
      - ./gateway-service/.env
    ports:
      - "80:9000"
    depends_on:
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *java-healthcheck
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:9000/actuator/health || exit 1" ]

  ingest-service:
    <<: *java-service
    build:
      context: ./ingest-service
    container_name: ingest-service
    env_file:
      - ./ingest-service/.env
    ports:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      gateway-service:
        condition: service_healthy
    healthcheck:
      <<: *java-healthcheck
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1" ]

  processing-service:
    <<: *java-service
    build:
      context: ./processing-service
    container_name: processing-service
    env_file:
      - ./processing-service/.env
    ports:
      - "8082"
    depends_on:
      ingest-service:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      <<: *java-healthcheck
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1" ]

  report-service:
    <<: *java-service
    build:
      context: ./report-service
    container_name: report-service
    env_file:
      - ./report-service/.env
    ports:
      - "8083"
    depends_on:
      processing-service:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      <<: *java-healthcheck
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health || exit 1" ]

volumes:
  postgres-data: