services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ingest-service/init-database.sql:/docker-entrypoint-initdb.d/ingest_service.sql
      - ./processing-service/init-database.sql:/docker-entrypoint-initdb.d/processing_service.sql
      - ./report-service/init-database.sql:/docker-entrypoint-initdb.d/report_service.sql
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: kafka
    env_file:
      - ./kafka.env
    ports:
      - "9092"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 5

  ingest-service:
    build:
      context: ./ingest-service
    container_name: ingest-service
    env_file:
      - ./ingest-service/.env
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
    ports:
      - "8081"
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  processing-service:
    build:
      context: ./processing-service
    container_name: processing-service
    env_file:
      - ./processing-service/.env
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
    ports:
      - "8082"
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      ingest-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  report-service:
    build:
      context: ./report-service
    container_name: report-service
    env_file:
      - ./report-service/.env
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
    ports:
      - "8083"
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      processing-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  api-gateway:
    image: nginx:1.29-alpine-slim
    container_name: api-gateway
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      ingest-service:
        condition: service_healthy
      report-service:
        condition: service_started

volumes:
  postgres-data: