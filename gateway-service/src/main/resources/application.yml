server:
  port: 9000

spring:
  application:
    name: gateway-service

  data:
    redis:
      host: redis
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8180/realms/microservices-realm

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

          routes:
            - id: ingest-service
              uri: http://ingest-service:8081
              predicates:
                - Path=/api/v1/uploads,/api/v1/uploads/{segment}/{action}
                - Method=POST,GET
              filters:
                - PreserveHostHeader
                - name: RequestSize
                  args:
                    maxSize: 10MB

            - id: report-service
              uri: http://report-service:8083
              predicates:
                - Path=/api/v1/reports,/api/v1/reports/{segment}/{action}
                - Method=GET
              filters:
                - PreserveHostHeader

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      access: read-only
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
    org.springframework.boot.actuate: INFO
    org.springframework.web.reactive.function.server: WARN