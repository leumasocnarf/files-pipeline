server:
  port: ${SERVER_PORT}

spring:
  application:
    name: ingest-service

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}

  mvc:
    problemdetails:
      enabled: true

logging:
  level:
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    org.hibernate: WARN
    com.demo.apiservice: INFO
